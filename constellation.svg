    <!-- Glows layer -->
    <g>
      <!-- Glow for point 0 -->
      <circle cx="43.4" cy="89.9" r="13.2" fill="#58a6ff" opacity="0.04" filter="url(#glow)">
        <animate attributeName="opacity" values="0.04;0.10;0.04" dur="7.0s" begin="0.6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
