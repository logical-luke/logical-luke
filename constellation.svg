        <animate attributeName="opacity" values="0.12;0.25;0.12" dur="8.0s" begin="4.0s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
      </circle>
