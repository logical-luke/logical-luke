        <animate attributeName="opacity" values="0.12;0.25;0.12" dur="6.1s" begin="3.1s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
      </circle>
      <!-- Glow for point 2 -->
      <circle cx="258.8" cy="115.1" r="28.1" fill="#58a6ff" opacity="0.04" filter="url(#glow)">
        <animate attributeName="opacity" values="0.04;0.10;0.04" dur="8.8s" begin="2.9s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
      </circle>
      <circle cx="258.8" cy="115.1" r="14.1" fill="#58a6ff" opacity="0.12" filter="url(#glow)">
