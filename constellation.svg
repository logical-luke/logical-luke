      </circle>
      <circle cx="456.8" cy="98.5" r="6.3" fill="#58a6ff" opacity="0.78">
        <animate attributeName="opacity" values="0.78;0.27;0.78" dur="5.3s" begin="2.0s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
