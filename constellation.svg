      </circle>
      <circle cx="458.3" cy="111.5" r="5.0" fill="#58a6ff" opacity="0.61">
        <animate attributeName="opacity" values="0.61;0.21;0.61" dur="9.6s" begin="4.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
      </circle>
      <circle cx="563.5" cy="93.7" r="3.1" fill="#58a6ff" opacity="0.75">
        <animate attributeName="opacity" values="0.75;0.26;0.75" dur="9.6s" begin="1.9s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
