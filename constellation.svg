<svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="200" fill="transparent"/>

  <!-- Floating constellation group -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0; 3,2; 0,0; -3,-2; 0,0" dur="20s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"/>

    <!-- Glows layer -->
    <g>
      <!-- Glow for point 0 -->
      <circle cx="76.5" cy="146.4" r="13.2" fill="#58a6ff" opacity="0.04" filter="url(#glow)">
        <animate attributeName="opacity" values="0.04;0.10;0.04" dur="8.9s" begin="1.1s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
      </circle>
      <circle cx="76.5" cy="146.4" r="6.6" fill="#58a6ff" opacity="0.12" filter="url(#glow)">
        <animate attributeName="opacity" values="0.12;0.25;0.12" dur="8.9s" begin="1.1s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
      </circle>
      <!-- Glow for point 1 -->
      <circle cx="175.6" cy="107.0" r="18.8" fill="#58a6ff" opacity="0.04" filter="url(#glow)">
