        <animate attributeName="opacity" values="0.57;0.20;0.57" dur="8.0s" begin="4.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
      </circle>
      <circle cx="545.5" cy="75.2" r="3.7" fill="#58a6ff" opacity="0.63">
        <animate attributeName="opacity" values="0.63;0.22;0.63" dur="8.1s" begin="4.9s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
