      </circle>
      <circle cx="362.6" cy="50.1" r="6.4" fill="#58a6ff" opacity="0.57">
        <animate attributeName="opacity" values="0.57;0.20;0.57" dur="7.2s" begin="1.9s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
