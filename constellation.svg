        <animate attributeName="opacity" values="0.12;0.25;0.12" dur="7.3s" begin="0.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
      </circle>
      <!-- Glow for point 2 -->
      <circle cx="258.2" cy="99.8" r="13.6" fill="#58a6ff" opacity="0.04" filter="url(#glow)">
        <animate attributeName="opacity" values="0.04;0.10;0.04" dur="6.9s" begin="1.4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
      </circle>
      <circle cx="258.2" cy="99.8" r="6.8" fill="#58a6ff" opacity="0.12" filter="url(#glow)">
