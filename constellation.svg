        <animate attributeName="opacity" values="0.85;0.30;0.85" dur="8.4s" begin="1.3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
      </circle>
      <circle cx="450.1" cy="87.1" r="5.1" fill="#58a6ff" opacity="0.75">
        <animate attributeName="opacity" values="0.75;0.26;0.75" dur="10.4s" begin="1.6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
