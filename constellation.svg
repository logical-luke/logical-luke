      </circle>
      <circle cx="431.7" cy="55.9" r="3.3" fill="#58a6ff" opacity="0.53">
        <animate attributeName="opacity" values="0.53;0.18;0.53" dur="6.3s" begin="4.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
      </circle>
      <circle cx="536.4" cy="89.7" r="6.1" fill="#58a6ff" opacity="0.63">
        <animate attributeName="opacity" values="0.63;0.22;0.63" dur="5.6s" begin="0.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
