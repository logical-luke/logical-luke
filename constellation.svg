      </circle>
      <circle cx="635.4" cy="112.9" r="21.6" fill="#58a6ff" opacity="0.12" filter="url(#glow)">
        <animate attributeName="opacity" values="0.12;0.25;0.12" dur="6.7s" begin="0.0s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
      </circle>
