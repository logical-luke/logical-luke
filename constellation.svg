    <!-- Glows layer -->
    <g>
      <!-- Glow for point 0 -->
      <circle cx="70.6" cy="119.4" r="14.9" fill="#58a6ff" opacity="0.04" filter="url(#glow)">
        <animate attributeName="opacity" values="0.04;0.10;0.04" dur="8.2s" begin="1.0s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
      </circle>
      <circle cx="70.6" cy="119.4" r="7.4" fill="#58a6ff" opacity="0.12" filter="url(#glow)">
