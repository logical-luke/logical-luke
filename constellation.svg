        <animate attributeName="opacity" values="0.77;0.27;0.77" dur="8.3s" begin="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
      </circle>
