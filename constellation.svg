        <animate attributeName="opacity" values="0.82;0.29;0.82" dur="6.2s" begin="2.6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
      </circle>
      <circle cx="466.4" cy="90.3" r="4.8" fill="#58a6ff" opacity="0.82">
        <animate attributeName="opacity" values="0.82;0.29;0.82" dur="10.6s" begin="1.9s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
