    <!-- Glows layer -->
    <g>
      <!-- Glow for point 0 -->
      <circle cx="51.7" cy="109.4" r="40.0" fill="#58a6ff" opacity="0.04" filter="url(#glow)">
        <animate attributeName="opacity" values="0.04;0.10;0.04" dur="7.7s" begin="2.6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
